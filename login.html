<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบหลังบ้าน | Daran Flooring Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-light);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #ef4444);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: #fff;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(245, 158, 11, 0.5);
        }

        .login-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h1 class="brand-title">DARAN FLOORING</h1>
            <p class="brand-subtitle">ระบบบริหารจัดการหลังบ้าน (Admin CMS Portal)</p>
        </div>

        <div id="login-error" class="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label" for="username">ชื่อผู้ใช้งาน (Username)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" class="form-input" placeholder="กรอกชื่อผู้ใช้..." required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">รหัสผ่าน (Password)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="กรอกรหัสผ่าน..." required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>เข้าสู่ระบบหลังบ้าน</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="login-footer">
            <p>© 2026 Daran Flooring & DV. All rights reserved.</p>
            <p style="margin-top: 8px;"><a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> กลับไปยังหน้าหลักเว็บไซต์</a></p>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('daran_admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('admin-login-form');
        const loginError = document.getElementById('login-error');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Default Credentials: admin / daran2026 (or custom)
            if ((username === 'admin' && password === 'daran2026') || (username === 'daran' && password === '123456')) {
                localStorage.setItem('daran_admin_logged_in', 'true');
                localStorage.setItem('daran_admin_user', username);
                window.location.href = 'admin.html';
            } else {
                errorText.innerText = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง (ลอง admin / daran2026)';
                loginError.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
